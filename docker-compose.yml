services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normalizer-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - normalizer

  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: normalizer-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --queue=csv-processing --timeout=1800 --tries=1 --sleep=3
    volumes:
      - .:/var/www
    depends_on:
      - mysql
      - redis
    networks:
      - normalizer

  nginx:
    image: nginx:alpine
    container_name: normalizer-nginx
    restart: unless-stopped
    ports:
      - "8889:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - normalizer

  mysql:
    image: mysql:8.0
    container_name: normalizer-mysql
    restart: unless-stopped
    ports:
      - "8888:3306"
    environment:
      MYSQL_DATABASE: address_normalizer
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_USER: normalizer
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - normalizer

  redis:
    image: redis:alpine
    container_name: normalizer-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - normalizer

networks:
  normalizer:
    driver: bridge

volumes:
  mysql-data:
